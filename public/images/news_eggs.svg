<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500">
  <defs>
    <radialGradient id="nbg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#FFFEF5"/>
      <stop offset="100%" stop-color="#F5EDD0"/>
    </radialGradient>
    <radialGradient id="nyolk" cx="40%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#F5D060"/>
      <stop offset="100%" stop-color="#C88010"/>
    </radialGradient>
  </defs>
  <rect width="600" height="500" fill="url(#nbg)"/>
  <!-- 皿 -->
  <ellipse cx="300" cy="360" rx="210" ry="55" fill="#EAE0C8" stroke="#D0C4A8" stroke-width="2"/>
  <ellipse cx="300" cy="350" rx="205" ry="50" fill="#F5EFE0"/>
  <!-- 大きな卵たち -->
  <g transform="translate(170,260)">
    <ellipse cx="0" cy="0" rx="72" ry="92" fill="#FAF5EC" stroke="#D8C890" stroke-width="2"/>
    <ellipse cx="0" cy="8" rx="38" ry="48" fill="url(#nyolk)" opacity="0.55"/>
    <ellipse cx="-15" cy="-28" rx="16" ry="10" fill="white" opacity="0.4" transform="rotate(-22,-15,-28)"/>
  </g>
  <g transform="translate(300,250)">
    <ellipse cx="0" cy="0" rx="78" ry="100" fill="#FAF5EC" stroke="#D8C890" stroke-width="2"/>
    <ellipse cx="0" cy="9" rx="42" ry="53" fill="url(#nyolk)" opacity="0.58"/>
    <ellipse cx="-16" cy="-30" rx="18" ry="11" fill="white" opacity="0.42" transform="rotate(-22,-16,-30)"/>
  </g>
  <g transform="translate(430,258)">
    <ellipse cx="0" cy="0" rx="70" ry="90" fill="#FAF5EC" stroke="#D8C890" stroke-width="2"/>
    <ellipse cx="0" cy="8" rx="36" ry="46" fill="url(#nyolk)" opacity="0.52"/>
    <ellipse cx="-14" cy="-27" rx="15" ry="9" fill="white" opacity="0.38" transform="rotate(-22,-14,-27)"/>
  </g>
  <!-- 布（テーブルクロス風） -->
  <rect x="0" y="380" width="600" height="120" fill="#F5EFE0"/>
  <!-- 葉っぱ装飾 -->
  <g transform="translate(60,130)" opacity="0.7">
    <ellipse cx="0" cy="0" rx="35" ry="18" fill="#8CC870" transform="rotate(-30)"/>
    <ellipse cx="40" cy="-10" rx="30" ry="16" fill="#7ABB60" transform="rotate(-15)"/>
    <ellipse cx="20" cy="20" rx="28" ry="14" fill="#6AAA50" transform="rotate(20)"/>
  </g>
  <g transform="translate(520,120)" opacity="0.65">
    <ellipse cx="0" cy="0" rx="32" ry="17" fill="#8CC870" transform="rotate(25)"/>
    <ellipse cx="-35" cy="-8" rx="28" ry="15" fill="#7ABB60" transform="rotate(10)"/>
