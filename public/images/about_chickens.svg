    <ellipse cx="-52" cy="8" rx="28" ry="15" fill="#B86820" stroke="#A05818" stroke-width="1" transform="rotate(-30,-52,8)"/>
    <ellipse cx="52" cy="8" rx="28" ry="15" fill="#B86820" stroke="#A05818" stroke-width="1" transform="rotate(30,52,8)"/>
    <line x1="-18" y1="70" x2="-26" y2="105" stroke="#F4A020" stroke-width="4" stroke-linecap="round"/>
    <line x1="18" y1="70" x2="12" y2="105" stroke="#F4A020" stroke-width="4" stroke-linecap="round"/>
    <line x1="-26" y1="105" x2="-34" y2="108" stroke="#F4A020" stroke-width="3"/>
    <line x1="-26" y1="105" x2="-22" y2="112" stroke="#F4A020" stroke-width="3"/>
    <line x1="12" y1="105" x2="6" y2="112" stroke="#F4A020" stroke-width="3"/>
