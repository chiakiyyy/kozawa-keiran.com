<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 600">
  <defs>
    <linearGradient id="abg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="60%" stop-color="#C8E8A0"/>
      <stop offset="100%" stop-color="#7CB870"/>
    </linearGradient>
    <radialGradient id="sunA" cx="70%" cy="25%" r="35%">
      <stop offset="0%" stop-color="#FFE840" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFE840" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="700" height="600" fill="url(#abg)"/>
  <rect width="700" height="600" fill="url(#sunA)"/>
  <!-- 草地 -->
  <ellipse cx="350" cy="680" rx="600" ry="280" fill="#6AAA58"/>
  <ellipse cx="0" cy="620" rx="250" ry="180" fill="#5A9A48"/>
  <ellipse cx="700" cy="610" rx="240" ry="170" fill="#5A9A48"/>
  <!-- 草 -->
  <g fill="#5A9A48" opacity="0.8">
    <ellipse cx="80" cy="500" rx="12" ry="30" transform="rotate(-15,80,500)"/>
    <ellipse cx="100" cy="495" rx="10" ry="25" transform="rotate(8,100,495)"/>
    <ellipse cx="600" cy="490" rx="12" ry="28" transform="rotate(12,600,490)"/>
    <ellipse cx="620" cy="495" rx="10" ry="24" transform="rotate(-10,620,495)"/>
  </g>
  <!-- 木 -->
