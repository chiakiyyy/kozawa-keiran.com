    <line x1="5" y1="18" x2="4" y2="36" stroke="#F4A020" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- 太陽光 -->
  <circle cx="580" cy="80" r="55" fill="#FFE840" opacity="0.65"/>
  <circle cx="580" cy="80" r="40" fill="#FFD700" opacity="0.7"/>
