    <ellipse cx="138" cy="138" rx="60" ry="40" fill="white"/>
    <ellipse cx="228" cy="132" rx="64" ry="38" fill="white"/>
  </g>
  <!-- ニワトリ1 (大・茶色) -->
  <g transform="translate(220,400)">
    <ellipse cx="0" cy="20" rx="65" ry="50" fill="#C87830" stroke="#A86020" stroke-width="1.5"/>
    <circle cx="0" cy="-25" r="38" fill="#C87830" stroke="#A86020" stroke-width="1.5"/>
    <polygon points="25,-25 42,-18 25,-12" fill="#F4A020"/>
    <ellipse cx="-2" cy="-54" rx="14" ry="8" fill="#CC2020"/>
