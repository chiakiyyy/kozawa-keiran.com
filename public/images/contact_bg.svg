  <ellipse cx="820" cy="285" rx="140" ry="78" fill="white" opacity="0.95"/>
  <!-- 黄身 -->
  <circle cx="835" cy="278" r="62" fill="#F5D060"/>
  <circle cx="835" cy="275" r="56" fill="#F0C840"/>
  <circle cx="915" cy="292" r="52" fill="#F5D060"/>
  <circle cx="915" cy="290" r="47" fill="#F0C840"/>
  <!-- ハイライト -->
  <ellipse cx="815" cy="255" rx="16" ry="10" fill="white" opacity="0.5" transform="rotate(-22,815,255)"/>
  <ellipse cx="895" cy="270" rx="14" ry="9" fill="white" opacity="0.45" transform="rotate(-22,895,270)"/>
  <!-- 葉っぱ装飾 -->
  <ellipse cx="700" cy="420" rx="80" ry="40" fill="rgba(255,255,255,0.15)" transform="rotate(-30,700,420)"/>
  <ellipse cx="1100" cy="80" rx="70" ry="35" fill="rgba(255,255,255,0.12)" transform="rotate(20,1100,80)"/>
