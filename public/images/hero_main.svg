<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="55%" stop-color="#C8E8F5"/>
      <stop offset="100%" stop-color="#D4E8C0"/>
    </linearGradient>
    <linearGradient id="field" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7CB870"/>
      <stop offset="100%" stop-color="#5A9A50"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE840"/>
      <stop offset="100%" stop-color="#FFB800" stop-opacity="0.3"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#sky)"/>
  <!-- 太陽 -->
  <circle cx="900" cy="120" r="75" fill="url(#sun)" opacity="0.75"/>
  <!-- 山 -->
  <ellipse cx="200" cy="480" rx="320" ry="200" fill="#5A8A50" opacity="0.5"/>
  <ellipse cx="1000" cy="490" rx="350" ry="220" fill="#4A7A40" opacity="0.45"/>
  <polygon points="300,420 550,200 800,420" fill="#4A8040" opacity="0.7"/>
  <polygon points="600,420 850,230 1100,420" fill="#5A9050" opacity="0.65"/>
  <!-- 雪 -->
  <polygon points="550,200 580,178 610,200" fill="white" opacity="0.85"/>
  <!-- 農場建物 -->
  <rect x="100" y="380" width="280" height="170" fill="#D4A050" rx="4"/>
  <polygon points="60,380 240,290 420,380" fill="#B8883A"/>
  <rect x="178" y="430" width="70" height="120" fill="#8B5E3C"/>
  <rect x="110" y="400" width="50" height="50" fill="#A8D8EA" rx="3"/>
  <rect x="258" y="400" width="50" height="50" fill="#A8D8EA" rx="3"/>
  <!-- 緑の畑 -->
  <ellipse cx="600" cy="680" rx="900" ry="320" fill="url(#field)"/>
  <!-- 木々 -->
  <g transform="translate(500,330)">
    <rect x="-8" y="60" width="16" height="90" fill="#6B4226"/>
    <ellipse cx="0" cy="38" rx="52" ry="68" fill="#5A9A50"/>
    <ellipse cx="-15" cy="20" rx="38" ry="50" fill="#6AAA60"/>
  </g>
  <g transform="translate(720,340)">
    <rect x="-7" y="50" width="14" height="78" fill="#6B4226"/>
    <ellipse cx="0" cy="30" rx="46" ry="60" fill="#5A9A50"/>
  </g>
  <!-- 雲 -->
  <g opacity="0.92">
    <ellipse cx="160" cy="140" rx="90" ry="50" fill="white"/>
    <ellipse cx="118" cy="158" rx="62" ry="42" fill="white"/>
    <ellipse cx="208" cy="152" rx="68" ry="40" fill="white"/>
  </g>
  <g opacity="0.88">
    <ellipse cx="700" cy="110" rx="80" ry="44" fill="white"/>
    <ellipse cx="660" cy="127" rx="55" ry="37" fill="white"/>
    <ellipse cx="748" cy="121" rx="62" ry="36" fill="white"/>
  </g>
  <!-- 卵カゴ (右側) -->
  <g transform="translate(850,350)">
    <!-- 籠 -->
    <ellipse cx="0" cy="85" rx="130" ry="40" fill="#C8A060"/>
    <path d="M-130,85 Q-145,0 -100,-30 Q-50,-55 0,-58 Q50,-55 100,-30 Q145,0 130,85 Z" fill="#D4B070" stroke="#B89050" stroke-width="2"/>
    <!-- 籠の編み目 -->
    <g stroke="#B89050" stroke-width="1.5" fill="none" opacity="0.6">
      <path d="M-120,60 Q0,-40 120,60"/>
      <path d="M-115,30 Q0,-55 115,30"/>
      <path d="M-60,80 Q-60,-50 -60,-50"/>
      <path d="M0,85 Q0,-58 0,-58"/>
      <path d="M60,80 Q60,-50 60,-50"/>
    </g>
    <!-- たまご -->
    <ellipse cx="-50" cy="30" rx="36" ry="45" fill="#E8C890" stroke="#D0AA60" stroke-width="1.5"/>
    <ellipse cx="10" cy="20" rx="38" ry="48" fill="#F0D4A0" stroke="#D0AA60" stroke-width="1.5"/>
    <ellipse cx="65" cy="28" rx="34" ry="43" fill="#E4C088" stroke="#D0AA60" stroke-width="1.5"/>
    <ellipse cx="-20" cy="-15" rx="32" ry="40" fill="#DDB870" stroke="#C8A050" stroke-width="1.5"/>
    <ellipse cx="38" cy="-20" rx="33" ry="42" fill="#ECC890" stroke="#D0AA60" stroke-width="1.5"/>
    <!-- 卵のハイライト -->
    <ellipse cx="-58" cy="16" rx="10" ry="6" fill="white" opacity="0.35" transform="rotate(-20,-58,16)"/>
    <ellipse cx="2" cy="6" rx="11" ry="7" fill="white" opacity="0.35" transform="rotate(-20,2,6)"/>
    <ellipse cx="57" cy="14" rx="10" ry="6" fill="white" opacity="0.35" transform="rotate(-20,57,14)"/>
    <!-- 布 -->
    <ellipse cx="0" cy="85" rx="130" ry="40" fill="#F5F0E0" opacity="0.6"/>
    <path d="M-130,85 Q-160,90 -180,110" fill="none" stroke="#E8E0C8" stroke-width="2"/>
    <path d="M130,85 Q160,95 175,115" fill="none" stroke="#E8E0C8" stroke-width="2"/>
  </g>
  <!-- 光のオーバーレイ -->
  <rect width="1200" height="700" fill="rgba(255,248,220,0.05)"/>
</svg>