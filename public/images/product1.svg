<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <radialGradient id="pbg1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFEF5"/>
      <stop offset="100%" stop-color="#FFF5D0"/>
    </radialGradient>
    <radialGradient id="pegg1" cx="38%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#FFFEF5"/>
      <stop offset="100%" stop-color="#E8DFC8"/>
    </radialGradient>
    <radialGradient id="pyolk1" cx="40%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#FFD840"/>
      <stop offset="100%" stop-color="#C88010"/>
    </radialGradient>
  </defs>
  <rect width="600" height="600" fill="url(#pbg1)"/>
  <!-- 皿 -->
  <ellipse cx="300" cy="420" rx="220" ry="40" fill="#F0E8D8" stroke="#D8CCB8" stroke-width="2"/>
  <ellipse cx="300" cy="415" rx="215" ry="35" fill="#FAF5EC"/>
  <!-- 目玉焼き白身 -->
  <ellipse cx="300" cy="370" rx="155" ry="80" fill="white" stroke="#E8E0D0" stroke-width="1.5"/>
  <!-- 黄身 -->
  <circle cx="300" cy="355" r="62" fill="url(#pyolk1)"/>
  <circle cx="300" cy="352" r="58" fill="#FFD840"/>
  <ellipse cx="278" cy="334" rx="18" ry="12" fill="white" opacity="0.45" transform="rotate(-22,278,334)"/>
  <!-- 大きなたまご (右上) -->
  <g transform="translate(460,180)">
    <ellipse cx="0" cy="0" rx="75" ry="95" fill="url(#pegg1)" stroke="#D8C890" stroke-width="1.5"/>
    <ellipse cx="0" cy="8" rx="40" ry="50" fill="url(#pyolk1)" opacity="0.5"/>
    <ellipse cx="-16" cy="-28" rx="16" ry="10" fill="white" opacity="0.4" transform="rotate(-22,-16,-28)"/>
  </g>
  <!-- 小さなたまご (左上) -->
  <g transform="translate(140,190)" opacity="0.8">
    <ellipse cx="0" cy="0" rx="58" ry="74" fill="url(#pegg1)" stroke="#D8C890" stroke-width="1.5"/>
    <ellipse cx="0" cy="6" rx="30" ry="38" fill="url(#pyolk1)" opacity="0.45"/>
    <ellipse cx="-12" cy="-22" rx="13" ry="8" fill="white" opacity="0.38" transform="rotate(-22,-12,-22)"/>
  </g>
  <!-- 葉っぱ装飾 -->
  <ellipse cx="80" cy="520" rx="60" ry="35" fill="#8CC870" opacity="0.5" transform="rotate(-40,80,520)"/>
  <ellipse cx="520" cy="510" rx="55" ry="30" fill="#8CC870" opacity="0.45" transform="rotate(35,520,510)"/>
  <!-- パッケージラベル -->
  <rect x="210" y="480" width="180" height="60" rx="8" fill="#F2C94C" opacity="0.9"/>
  <text x="300" y="514" font-family="serif" font-size="16" fill="#3D2B1F" text-anchor="middle" font-weight="bold">新鮮たまご</text>
  <text x="300" y="530" font-family="sans-serif" font-size="10" fill="#5C3D2E" text-anchor="middle">Fresh Eggs</text>
</svg>